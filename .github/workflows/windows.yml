name: Build - Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haxe 4.3.7
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install haxelibs
        run: |
          haxelib install lime          --quiet
          haxelib install openfl        --quiet
          haxelib install flixel        --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui     --quiet
          haxelib install hscript       --quiet
          haxelib install newgrounds    --quiet
          haxelib install polymod       --quiet

          haxelib run lime setup -quiet

      - name: Fix jsonpath/thx.core incompatibility
        # jsonpath 1.1.0 calls thx.Arrays.containsExact which doesn't exist
        # in thx.core 0.44.0. Downgrade jsonpath to 1.0.0 which is compatible.
        run: |
          haxelib install jsonpath 1.0.0 --quiet
          haxelib set jsonpath 1.0.0

      - name: Build (release)
        run: haxelib run lime build windows -release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunkinBanana-Windows
          path: export/release/windows/bin/
          if-no-files-found: error
